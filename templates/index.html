<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Price Predictor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #141e30, #243b55);
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            margin-top: 60px;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.4);
            background: white;
        }

        h2 {
            text-align: center;
            font-weight: bold;
            margin-bottom: 25px;
        }

        label {
            font-weight: 500;
        }

        .btn-custom {
            background: linear-gradient(to right, #000, #434343);
            color: white;
            border-radius: 10px;
            padding: 10px;
            font-size: 16px;
        }

        .btn-custom:hover {
            background: linear-gradient(to right, #434343, #000);
        }

        .result-box {
            background: #d4edda;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <h2>🚗 Used Car Price Prediction</h2>

        <form action="/predict" method="post">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Brand</label>
                    <input type="text" name="brand" class="form-control" placeholder="e.g. Maruti" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Manufacturing Year</label>
                    <input type="number" name="model_year" class="form-control" placeholder="e.g. 2018" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Present Price (₹ Lakhs)</label>
                    <input type="number" step="0.1" name="Present_Price" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Kilometers Driven</label>
                    <input type="number" name="Kms_Driven" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Fuel Type</label>
                    <select name="fuel_type" class="form-control">
                        <option>Petrol</option>
                        <option>Diesel</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Seller Type</label>
                    <select name="Seller_Type" class="form-control">
                        <option>Dealer</option>
                        <option>Individual</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Transmission</label>
                    <select name="transmission" class="form-control">
                        <option>Manual</option>
                        <option>Automatic</option>
                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Owner</label>
                    <select name="Owner" class="form-control">
                        <option value="0">First Owner</option>
                        <option value="1">Second Owner</option>
                        <option value="2">Third Owner</option>
                    </select>
                </div>

            </div>

            <button type="submit" class="btn btn-custom w-100">
                Predict Price
            </button>

        </form>

        {% if prediction_text %}
        <div class="result-box">
            {{ prediction_text }}
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
